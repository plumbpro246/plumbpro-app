services:
  - type: web
    name: plumbpro-api
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: "apt-get update && apt-get install -y poppler-utils && pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r requirements.txt"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
